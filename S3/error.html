<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Error Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div
      class="bg-white p-8 rounded-2xl shadow-xl max-w-sm w-full text-center border border-gray-200"
    >
      <div class="flex justify-center mb-5">
        <div class="bg-red-100 p-4 rounded-full">
          <i data-lucide="alert-circle" class="w-12 h-12 text-red-500"></i>
        </div>
      </div>

      <h1 class="text-2xl font-bold text-gray-800 mb-2">Error!</h1>
      <p class="text-gray-600 mb-6">
        요청하신 작업을 처리하는 중 <br />
        문제가 발생했습니다.
      </p>

      <button
        onclick="location.reload()"
        class="w-full bg-red-500 hover:bg-red-600 text-white font-semibold py-3 rounded-lg transition duration-300"
      >
        다시 시도하기
      </button>
    </div>

    <script>
      // 아이콘 렌더링 실행
      lucide.createIcons();
    </script>
  </body>
</html>
